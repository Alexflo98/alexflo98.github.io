<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Returning to ForgeFit</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f2ea;
      color: #1f1f1f;
      text-align: center;
    }
    main {
      max-width: 420px;
    }
    a {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 999px;
      background: #334b3a;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
    p {
      color: #5d5d5d;
    }
  </style>
</head>
<body>
  <main>
    <h1>Returning to ForgeFit…</h1>
    <p>If the app does not open automatically, tap the button below.</p>
    <a id="openLink" href="#">Open ForgeFit</a>
  </main>

  <script>
    const target = "forgefit://oura/callback" + window.location.search + window.location.hash;
    const link = document.getElementById("openLink");
    link.href = target;

    setTimeout(() => {
      window.location.href = target;
    }, 150);

    setTimeout(() => {
      window.location.href = target;
    }, 1000);
  </script>
</body>
</html>
