<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connecting Oura to ForgeFit</title>
  <meta http-equiv="refresh" content="0; url=forgefit://oura/callback" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #faf8f4;
      color: #1f1f1f;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      text-align: center;
    }
    a { color: #2f5d50; }
  </style>
</head>
<body>
  <script>
    const target = "forgefit://oura/callback" + window.location.search + window.location.hash;
    window.location.replace(target);
  </script>
  <main>
    <h1>Returning to ForgeFit…</h1>
    <p>If the app does not open automatically, tap below.</p>
    <p><a id="openLink" href="#">Open ForgeFit</a></p>
  </main>
  <script>
    document.getElementById("openLink").href =
      "forgefit://oura/callback" + window.location.search + window.location.hash;
  </script>
</body>
</html>
